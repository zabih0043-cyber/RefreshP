<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REFRESHP | Holding Page</title>
    <meta
      name="description"
      content="REFRESHP holding page with a refined left-aligned layout."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="background-image" aria-hidden="true"></div>
      <div class="background-overlay" aria-hidden="true"></div>

      <main class="hero" aria-label="REFRESHP holding page">
        <section class="content-panel">
          <div
            class="logo-plaque logo-plaque--image"
            aria-label="REFRESHP logo"
          >
            <img
              class="logo-plaque__image"
              src="assets/RefreshP Logo and Strapline-01.png"
              alt="REFRESHP logo"
            />
          </div>

          <div class="hero-copy">
            <h1 class="hero-copy__headline">
              <span class="hero-copy__headline-line">Website</span>
              <span class="hero-copy__headline-line">coming soon</span>
            </h1>

            <p class="hero-copy__subheadline">
              A refreshed digital experience is taking shape. For enquiries,
              please contact us below.
            </p>
          </div>

          <address class="contact-block" aria-label="Contact details">
            <p class="contact-block__title">Contact</p>

            <a class="contact-link" href="mailto:dh@refreshp.com">
              <span class="contact-link__label">Email</span>
              <span class="contact-link__value">dh@refreshp.com</span>
            </a>

            <a class="contact-link" href="tel:+447974397818">
              <span class="contact-link__label">Phone</span>
              <span class="contact-link__value">+44 7974 397818</span>
            </a>
          </address>

          <p class="powered-by">
            Powered by
            <a
              class="powered-by__link"
              href="https://digitalzp.com"
              target="_blank"
              rel="noreferrer"
            >
              DigitalZP.com
            </a>
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
